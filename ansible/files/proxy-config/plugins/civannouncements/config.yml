
# messages must be in minimessage format
# https://webui.advntr.dev/
scheduledAnnouncements:
  - cron: "30 9 * * *"
    message: "civ.scheduledAnnouncements.restart-30"
    translate: true
  - cron: "45 9 * * *"
    message: "civ.scheduledAnnouncements.restart-15"
    translate: true
  - cron: "55 9 * * *"
    message: "civ.scheduledAnnouncements.restart-5"
    translate: true
  - cron: "59 9 * * *"
    message: "civ.scheduledAnnouncements.restart-1"
    translate: true
  - cron: "30 9 * * *"
    message: "civ.scheduledAnnouncements.restart"
    bossbar_seconds: 1800
    translate: true

  - cron: "* * * * *"
    message: "civ.scheduledAnnouncements.test"
    translate: true
